name: Daily Data Update

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Extract latest admission data
        run: |
          python -m pip install pyxlsb oletools
          python scripts/extract_data.py
          python scripts/audit_against_excel_cache.py
          node scripts/validate_engine.mjs
          python scripts/build_integrity_report.py

      - name: Persist refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/admissions.json data/audit.json data/integrity.json
          if ! git diff --cached --quiet; then
            git commit -m "Refresh admission data [skip ci]"
            git push
          fi

      - name: Create permanent public site
        run: |
          if [ -f data/deployment.json ]; then
            echo "Public site already exists"
            exit 0
          fi

          node scripts/build_standalone.mjs
          response_file="$RUNNER_TEMP/pagey-response.json"
          http_code=$(curl --silent --show-error \
            --request POST "https://pagey.site/api/public/sites/" \
            --form "file=@artifacts/univ-admission-standalone.html;filename=index.html;type=text/html" \
            --form "title=University Admission Possibility" \
            --output "$response_file" \
            --write-out "%{http_code}")

          if [ "$http_code" != "200" ] && [ "$http_code" != "201" ]; then
            node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync(process.argv[1],'utf8')); console.error(r.error || 'Public deployment failed');" "$response_file"
            exit 1
          fi

          node scripts/record_pagey_deployment.mjs "$response_file"
          git add data/deployment.json
          git commit -m "Record public deployment [skip ci]"
          git push

