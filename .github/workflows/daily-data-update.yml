name: Daily Data Update and Pages Deploy

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Extract latest admission data
        run: |
          python -m pip install pyxlsb oletools
          python scripts/extract_data.py
          python scripts/audit_against_excel_cache.py
          node scripts/validate_engine.mjs
          python scripts/build_integrity_report.py

      - name: Persist refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/admissions.json data/audit.json data/integrity.json
          if ! git diff --cached --quiet; then
            git commit -m "Refresh admission data [skip ci]"
            git push
          fi

      - name: Prepare public site
        run: |
          mkdir public-site
          cp index.html styles.css app.js engine.js public-site/
          cp -R data public-site/data

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public-site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4

