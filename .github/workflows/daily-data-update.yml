name: Daily Data Update

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Extract latest admission data
        run: |
          python -m pip install pyxlsb oletools
          python scripts/extract_data.py
          python scripts/audit_against_excel_cache.py
          node scripts/validate_engine.mjs
          python scripts/build_integrity_report.py

      - name: Persist refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/admissions.json data/audit.json data/integrity.json
          if ! git diff --cached --quiet; then
            git commit -m "Refresh admission data [skip ci]"
            git push
          fi

